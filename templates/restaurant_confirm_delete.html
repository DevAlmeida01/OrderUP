{% extends 'base.html' %}
{% block content %}
<div class="form-card" style="text-align:center">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <h2>Excluir restaurante?</h2>
  <p>Esta ação não pode ser desfeita.</p>
  <form method="post" style="display:flex;gap:10px;justify-content:center;margin-top:24px">
    {% csrf_token %}
    <button type="submit" style="background:var(--red);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer">Confirmar exclusão</button>
    <a href="{% url 'restaurant_list' %}" class="btn-gray">Cancelar</a>
  </form>
</div>
{% endblock %}
