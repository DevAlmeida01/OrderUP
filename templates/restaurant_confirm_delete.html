{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-lg border-danger rounded-4">
                <div class="card-body p-5">
                    <h1 class="display-1 text-danger mb-3">⚠️</h1>
                    <h3 class="fw-bold">Excluir Restaurante?</h3>
                    <p class="text-muted">Você tem certeza que deseja excluir o restaurante <strong>"{{ restaurant.name }}"</strong>? Esta ação apagará todo o cardápio e os pedidos vinculados a ele. Isso não pode ser desfeito!</p>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg me-2">Sim, Excluir</button>
                        <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-secondary btn-lg">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
