{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow-lg p-4 rounded-4">
        
        <h2 class="text-center mb-4">🛒 Fazer Pedido</h2>

        <form method="post">
            {% csrf_token %}

            <div id="items-container">
                <div class="row mb-3 item-row">
                    <div class="col-md-6">
                        <label>Produto:</label>
                        <select name="menu_item" class="form-control">
                            <option value="">Selecione</option>
                            {% for item in menu_items %}
                                <option value="{{ item.id }}">
                                    {{ item.name }} - R$ {{ item.price }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Quantidade:</label>
                        <input type="number" name="quantity" class="form-control" min="1" value="1">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-danger remove-item">X</button>
                    </div>
                </div>
            </div>

            <button type="button" id="add-item" class="btn btn-secondary mb-3">
                ➕ Adicionar Produto
            </button>

            <div class="mb-3">
                <label>Tipo do Pedido:</label>
                {{ form.order_type }}
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-success px-4">
                    ✔ Confirmar Pedido
                </button>

                <a href="{% url 'restaurant_list' %}" 
                   class="btn btn-outline-secondary px-4 ms-2">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

<script>
document.getElementById('add-item').addEventListener('click', function() {
    const container = document.getElementById('items-container');
    const firstItem = document.querySelector('.item-row');
    const newItem = firstItem.cloneNode(true);

    newItem.querySelectorAll('input').forEach(input => {
        input.value = 1;
    });

    newItem.querySelectorAll('select').forEach(select => {
        select.value = '';
    });

    container.appendChild(newItem);
});

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-item')) {
        const rows = document.querySelectorAll('.item-row');
        if (rows.length > 1) {
            e.target.closest('.item-row').remove();
        }
    }
});

// 🔥 limpeza antes de enviar (evita itens vazios)
document.querySelector('form').addEventListener('submit', function(e) {
    const rows = document.querySelectorAll('.item-row');

    rows.forEach(row => {
        const select = row.querySelector('select');
        const input = row.querySelector('input');

        if (!select.value || input.value <= 0) {
            row.remove();
        }
    });
});
</script>

{% endblock %}
