{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm p-4">
    <h3>Excluir Restaurante</h3>
    <p>Tem certeza que deseja excluir <strong>{{ restaurant.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar</button>
        <a href="{% url 'restaurant_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
