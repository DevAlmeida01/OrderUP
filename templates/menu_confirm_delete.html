{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg text-center rounded-4 border-danger">
                <div class="card-body p-5">
                    
                    <h1 class="text-danger mb-4">⚠️ Atenção!</h1>
                    <h4>Você tem certeza que deseja excluir o produto:</h4>
                    <h3 class="fw-bold my-3">"{{ item.name }}"?</h3>
                    <p class="text-muted">Esta ação não poderá ser desfeita.</p>

                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg px-4 me-2">
                            🗑️ Sim, Excluir Produto
                        </button>
                        <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-secondary btn-lg px-4">
                            Cancelar
                        </a>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
