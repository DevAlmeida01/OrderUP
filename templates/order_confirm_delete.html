{% extends 'base.html' %}
{% block content %}
<div class="form-card" style="text-align:center">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <h2>Cancelar pedido #{{ order.id }}?</h2>
  <form method="post" style="display:flex;gap:10px;justify-content:center;margin-top:24px">
    {% csrf_token %}
    <button type="submit" style="background:var(--red);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer">Cancelar pedido</button>
    <a href="{% url 'order_detail' order.pk %}" class="btn-gray">Voltar</a>
  </form>
</div>
{% endblock %}
