{% extends 'base.html' %}
{% block title %}Entrar — OrderUP{% endblock %}
{% block content %}
<div class="form-card">
  <div style="text-align:center;margin-bottom:28px">
    <div style="width:56px;height:56px;background:linear-gradient(135deg,#EA1D2C,#FF385C);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px">🍽</div>
    <h2>Bem-vindo de volta</h2>
    <p>Entre na sua conta para continuar</p>
  </div>

  {% if form.errors %}
  <div class="alert-orderup alert-error"><i class="bi bi-exclamation-circle"></i> Usuário ou senha incorretos.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label-modern">Usuário</label>
      <input type="text" name="username" class="form-control-modern" placeholder="seu_usuario" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label-modern">Senha</label>
      <input type="password" name="password" class="form-control-modern" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-red" style="width:100%;justify-content:center;padding:14px">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>
  </form>

  <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
    Não tem conta? <a href="{% url 'register' %}" style="color:var(--red);font-weight:600">Cadastre-se grátis</a>
  </p>
</div>
{% endblock %}
